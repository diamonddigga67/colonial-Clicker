<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Colonial Clicker</title>
    <link rel="stylesheet" href="style.css">
    <meta name="A game that revolves around All Tommorow" content="Colonial Clicker is an evolution-based incremental game inspired by All Tomorrows. Click, evolve, and ascend your posthuman species.">
<meta name="DiamondDigga69" content="Colonial Clicker, clicker game, incremental game, evolution game, All Tomorrows, idle game">
<meta name="DiamondDigga69" content="DiamondDigga69">

</head>
<body>

    <div id="game-container">

        <!-- LEFT: EVOLUTION BUILDINGS -->
        <div id="upgrade-panel">
            <h2>Evolution Tree</h2>
            <div id="buildings"></div>
        </div>

        <!-- CENTER: MAIN GAME -->
        <div id="main-area">
            <h1>Colonial Clicker</h1>

            <div id="counter">Colonials: 0</div>
            <div id="cps-counter">CPS: 0</div>

            <div id="image-wrapper">
                <img id="colonial-img" src="colonial.png" alt="Colonial">
                <div id="float-container"></div>
            </div>
        </div>

        <!-- RIGHT: SPECIAL UPGRADES -->
        <div id="boost-panel">
            <h2>Upgrades</h2>
            <div id="boosts"></div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
